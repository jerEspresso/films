# GitHub Pages — Jekyll configuration
# Guide: https://docs.github.com/en/pages/setting-up-a-github-pages-site-with-jekyll/adding-a-theme-to-your-github-pages-site-using-jekyll

title: Film Companions
description: Cultural companions to film — background guides and scene-by-scene close readings.

# Theme applied to Jekyll-rendered pages (Markdown, or pages with front matter).
# Your existing standalone .html pages have no front matter, so Jekyll serves
# them as-is and the theme does not affect them.
#
# Swap the value below to any GitHub Pages supported theme:
#   jekyll-theme-architect   jekyll-theme-cayman     jekyll-theme-dinky
#   jekyll-theme-hacker      jekyll-theme-leap-day   jekyll-theme-merlot
#   jekyll-theme-midnight    jekyll-theme-minimal    jekyll-theme-modernist
#   jekyll-theme-slate       jekyll-theme-tactile    jekyll-theme-time-machine
# (the default "minima" theme uses:  theme: minima)
theme: jekyll-theme-cayman
