<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Film Companions">
  <defs>
    <radialGradient id="seal" cx="50%" cy="40%" r="72%">
      <stop offset="0%" stop-color="#A11F33"/>
      <stop offset="100%" stop-color="#7C1626"/>
    </radialGradient>
  </defs>
  <!-- wax-seal tile -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#seal)"/>
  <!-- double gold rule (echoes the page header rules) -->
  <rect x="6" y="6" width="52" height="52" rx="10" fill="none" stroke="#C9A86C" stroke-width="1.6"/>
  <rect x="9" y="9" width="46" height="46" rx="7.5" fill="none" stroke="#C9A86C" stroke-width="0.8" opacity="0.55"/>
  <!-- gold four-point seal star (the ✦ from the page headers) -->
  <polygon points="32,13 35.9,28.1 51,32 35.9,35.9 32,51 28.1,35.9 13,32 28.1,28.1" fill="#E2B45F"/>
